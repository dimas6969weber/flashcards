<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Flashcards</title>
</head>
<body>

  <h1>Карточки (Flashcards)</h1>

  <div class="box">
    <h2>Создать карточку</h2>

    <textarea
      id="frontInput"
      placeholder="Лицевая сторона (вопрос или термин)"
    ></textarea>

    <textarea
      id="backInput"
      placeholder="Оборотная сторона (ответ или определение)"
    ></textarea>

    <button onclick="addCard()">Добавить карточку</button>
  </div>


  <div class="box">
    <h2>Все карточки</h2>

    <table>
      <thead>
        <tr>
          <th>Лицевая сторона</th>
          <th>Оборотная сторона</th>
          <th>Выучена</th>
          <th>Действия</th>
        </tr>
      </thead>

      <tbody id="cardsTable"></tbody>
    </table>
  </div>


  <div class="box">
    <h2>Режим изучения</h2>

    <select id="modeSelect" onchange="renderStudyCard()">
      <option value="all">Все карточки</option>
      <option value="unlearned">Только невыученные</option>
    </select>

    <button onclick="shuffleCards()">Перемешать</button>

    <div class="study-card" id="studyCard">
      Нет карточек
    </div>

    <div class="controls">
      <button onclick="prevCard()">Назад</button>
      <button onclick="flipCard()">Перевернуть</button>
      <button onclick="nextCard()">Вперёд</button>
    </div>
  </div>
</body>
  <script src="main.js"></script>
</html>
